name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # Run tests fully in-band to avoid intermittent cross-worker
        # ESM/stream deadlocks observed on hosted runners.
        if: matrix.node != '22'
        run: npm run test:ci

      - name: Coverage
        # Only collect coverage once (on Node 22) to keep CI fast; run in-band
        # for maximum stability on hosted runners.
        if: matrix.node == '22'
        run: npm run test:ci:coverage

      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
