name: CI

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # Constrain parallelism and bump the per-test timeout: GitHub-hosted
        # runners are noticeably slower than local machines, and the
        # combination of `--experimental-vm-modules` + `ts-jest` makes worker
        # startup expensive. Running with too many workers causes flaky
        # timeouts in the local-pipeline / job-supervisor / file-local tests.
        env:
          NODE_OPTIONS: --experimental-vm-modules --max-old-space-size=4096
        run: npx jest --maxWorkers=2 --testTimeout=60000

      - name: Coverage
        # Only collect coverage once (on Node 22) to keep CI fast; upload as an
        # artifact so we can compare before / after dependency upgrades.
        if: matrix.node == '22'
        env:
          NODE_OPTIONS: --experimental-vm-modules --max-old-space-size=4096
        run: npx jest --coverage --maxWorkers=2 --testTimeout=60000

      - name: Upload coverage artifact
        if: matrix.node == '22'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
